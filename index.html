<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fallout | Facciones</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #000000;
      --panel: #111111;
      --border: #333333;
      --text: #ffffff;
      --accent: #ffb642; /* Un tono amarillo/naranja estilo Fallout */
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Trebuchet MS', Arial, sans-serif;
      height: 100vh;
      overflow-x: hidden;
    }

    /* Layout Principal */
    .app-container {
      display: flex;
      height: 100vh;
    }

    /* Barra Lateral Izquierda */
    .sidebar {
      width: 250px;
      background: var(--panel);
      border-right: 2px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 20px;
    }

    .tab {
      position: relative;
      display: block;
      height: 120px;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid var(--border);
      text-decoration: none;
      transition: transform 0.2s, border-color 0.2s;
    }

    .tab:hover {
      transform: scale(1.05);
      border-color: var(--accent);
    }

    .tab img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    .tab:hover img {
      opacity: 0.8;
    }

    .tab span {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ffffff;
      font-size: 1.2rem;
      font-weight: bold;
      text-align: center;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
      width: 100%;
      pointer-events: none;
    }

    /* Contenido Central */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
      overflow-y: auto;
    }

    .main-title {
      font-size: 5rem;
      margin: 0 0 10px 0;
      text-transform: uppercase;
      letter-spacing: 5px;
      color: #ffffff;
      text-shadow: 0px 0px 10px rgba(255, 255, 255, 0.3);
    }

    .subtitle-box {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 15px 30px;
      border-radius: 8px;
      margin-bottom: 40px;
    }

    .subtitle-box h2 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: normal;
      text-align: center;
    }

    .image-container {
      width: 100%;
      max-width: 600px;
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .image-container img {
      width: 100%;
      height: auto;
      border-radius: 8px;
    }

    @media (max-width: 768px) {
      .app-container {
        flex-direction: column;
      }
      .sidebar {
        width: 100%;
        flex-direction: row;
        border-right: none;
        border-bottom: 2px solid var(--border);
        overflow-x: auto;
        height: auto;
      }
      .tab {
        flex: 0 0 150px;
        height: 80px;
      }
      .main-title {
        font-size: 3rem;
      }
    }
  </style>
</head>
<body>

  <div class="app-container">
    <aside class="sidebar">
      <a href="rnc.html" class="tab">
        <img src="img-rnc-bg.jpg" alt="RNC">
        <span>RNC</span>
      </a>
      <a href="hermandad.html" class="tab">
        <img src="img-hermandad-bg.jpg" alt="Hermandad del Acero">
        <span>Hermandad del acero</span>
      </a>
      <a href="enclave.html" class="tab">
        <img src="img-enclave-bg.jpg" alt="Enclave">
        <span>Enclave</span>
      </a>
    </aside>

    <main class="main-content">
      <h1 class="main-title">Fallout</h1>
      
      <div class="subtitle-box">
        <h2>Conoce a las facciones de una de las grandes franquicias apocalípticas</h2>
      </div>

      <div class="image-container">
        <img src="vaultboy.jpg" alt="Vault Boy">
      </div>
    </main>
  </div>

</body>
</html>
